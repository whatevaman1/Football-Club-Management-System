<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Management - Loan Center</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <div class="logo">FC Management</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="players.html">Players</a></li>
            <li><a href="contracts.html">Contracts</a></li>
            <li><a href="clubs.html">Clubs</a></li>
            <li><a href="performance.html">Performance</a></li>
            <li><a href="loaned.html" class="active">Loaned Players</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Loan Center</h1>
            <p>Active and historical player loan transfers</p>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Player Name</th>
                        <th>Parent Club</th>
                        <th>Loaned To</th>
                        <th>Loan Period</th>
                        <th>Time Remaining</th>
                    </tr>
                </thead>
                <tbody id="loanedBody">
                    <tr><td colspan="5" style="text-align:center;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchData('loaned', 'loanedBody', (loan) => {
                const days = loan.DaysRemaining;
                let dayBadge = `<span style="color:var(--highlight)">${days} Days</span>`;
                if(days < 30 && days >= 0) dayBadge = `<span style="background:#ef4444; color:white; padding:2px 6px; border-radius:4px;">${days} Days (Ending Soon)</span>`;
                else if (days < 0) dayBadge = `<span style="color:#6b7280">Expired</span>`;
                
                return `
                <tr>
                    <td><strong>${loan.PlayerName}</strong></td>
                    <td>${loan.ParentClub}</td>
                    <td><span style="color:var(--highlight)">${loan.LoanClub}</span></td>
                    <td>${new Date(loan.StartDate).toLocaleDateString()} - ${new Date(loan.EndDate).toLocaleDateString()}</td>
                    <td>${dayBadge}</td>
                </tr>
            `});
        });
    </script>
</body>
</html>
