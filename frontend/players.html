<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Management - Player Registry</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .form-container {
            background-color: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .form-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .form-group input, .form-group select {
            padding: 0.6rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-dark);
            color: white;
            outline: none;
        }
        .btn-add {
            padding: 0.6rem 1.5rem;
            background-color: var(--highlight);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-add:hover { background-color: #059669; }
        
        .btn-delete {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-delete:hover { background-color: #dc2626; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">FC Management</div>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="players.html" class="active">Players</a></li>
            <li><a href="contracts.html">Contracts</a></li>
            <li><a href="salaries.html">Salaries</a></li>
            <li><a href="clubs.html">Clubs</a></li>
            <li><a href="performance.html">Performance</a></li>
            <li><a href="loaned.html">Loaned</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Player Registry</h1>
            <p>Manage squad lists (Add, Delete, Search)</p>
        </div>

        <div class="form-container">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="pName" placeholder="e.g. Lionel Messi">
            </div>
            <div class="form-group">
                <label>Nationality</label>
                <input type="text" id="pNat" placeholder="e.g. Argentina">
            </div>
            <div class="form-group">
                <label>Position</label>
                <select id="pPos">
                    <option value="Forward">Forward</option>
                    <option value="Midfielder">Midfielder</option>
                    <option value="Defender">Defender</option>
                    <option value="Goalkeeper">Goalkeeper</option>
                </select>
            </div>
            <div class="form-group">
                <label>Shirt No.</label>
                <input type="number" id="pShirt" placeholder="10" style="width: 70px;">
            </div>
            <div class="form-group">
                <label>Sign to Club</label>
                <select id="pClub">
                    <option value="">-- Free Agent --</option>
                    <!-- Will be populated dynamically -->
                </select>
            </div>
            <div class="form-group">
                <button class="btn-add" onclick="addPlayer()">+ Add Player</button>
            </div>
        </div>

        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search by player or club name..." onkeyup="filterTable()">
        </div>

        <div class="table-wrapper">
            <table id="playersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Position (No.)</th>
                        <th>Nationality</th>
                        <th>Current Club</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="playersBody">
                    <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api';

        function loadPlayers() {
            fetchData('players', 'playersBody', (player) => `
                <tr id="row-${player.PlayerID}">
                    <td>${player.PlayerID}</td>
                    <td><strong>${player.Name}</strong></td>
                    <td>${player.Position} (${player.ShirtNumber || '-'})</td>
                    <td>${player.Nationality}</td>
                    <td><span style="color:var(--accent)">${player.ClubName || 'Free Agent'}</span></td>
                    <td><button class="btn-delete" onclick="deletePlayer(${player.PlayerID})">Delete</button></td>
                </tr>
            `);
        }

        async function loadClubs() {
            try {
                const response = await fetch(`${API_URL}/clubs`);
                const clubs = await response.json();
                const clubSelect = document.getElementById('pClub');
                clubs.forEach(club => {
                    const opt = document.createElement('option');
                    opt.value = club.ClubID;
                    opt.textContent = club.Name;
                    clubSelect.appendChild(opt);
                });
            } catch (err) {
                console.error("Failed to load clubs", err);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadPlayers();
            loadClubs();
        });

        async function addPlayer() {
            const name = document.getElementById('pName').value;
            const nationality = document.getElementById('pNat').value;
            const position = document.getElementById('pPos').value;
            const shirtNumber = document.getElementById('pShirt').value;
            const clubId = document.getElementById('pClub').value; // Get the selected Club!

            if(!name) return alert("Name is required!");

            await fetch(`${API_URL}/players`, {
                method: 'POST',
                headers:{ 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, nationality, position, shirtNumber, clubId: clubId || null })
            });

            // clear form and reload
            document.getElementById('pName').value = '';
            document.getElementById('pNat').value = '';
            document.getElementById('pShirt').value = '';
            document.getElementById('pClub').value = '';
            loadPlayers();
        }

        async function deletePlayer(id) {
            if(confirm("Are you sure you want to delete this player?")) {
                await fetch(`${API_URL}/players/${id}`, { method: 'DELETE' });
                loadPlayers();
            }
        }

        function filterTable() {
            const input = document.getElementById("searchInput").value.toUpperCase();
            const table = document.getElementById("playersTable");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                const tdName = tr[i].getElementsByTagName("td")[1];
                const tdClub = tr[i].getElementsByTagName("td")[4];
                if (tdName || tdClub) {
                    const txtValueName = tdName.textContent || tdName.innerText;
                    const txtValueClub = tdClub.textContent || tdClub.innerText;
                    if (txtValueName.toUpperCase().indexOf(input) > -1 || txtValueClub.toUpperCase().indexOf(input) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }       
            }
        }
    </script>
</body>
</html>
